name: QuantAlpha Release Stabilization CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Frontend Validation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install -g pnpm && pnpm install

      - name: Frontend Typecheck
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Frontend Tests (with Coverage)
        working-directory: frontend
        run: pnpm exec ng test --no-watch --no-progress --browsers=ChromeHeadless --code-coverage

      # 2. Backend Validation
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Gofmt Verification
        working-directory: backend
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Go Tests (with Race Detector & Coverage)
        working-directory: backend
        run: |
          go test -v -race -coverprofile=coverage.txt ./internal/...
          go tool cover -func=coverage.txt

      - name: Go Build
        working-directory: backend
        run: go build -o /dev/null ./cmd/server

      # 3. Worker Validation
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: worker/requirements.txt

      - name: Install Python Dependencies
        working-directory: worker
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Python Tests (with Coverage)
        working-directory: worker
        run: |
          pytest --cov=. --cov-report=term-missing

      # 4. Infrastructure Validation
      - name: Docker Compose Config Validation
        run: docker compose config -q

      - name: Artifact Upload (Coverage)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/coverage.txt
            frontend/coverage/
            worker/.coverage
